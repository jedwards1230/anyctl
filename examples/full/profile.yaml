# anyctl per-user profile. Binds the INSTALLED reference catalog (under
# catalogs/reference/) to THIS machine's endpoints. A catalog ships in portable
# form (no base_url, no secret ref); the bindings below complete every service it
# provides. anyctl has no built-in services, so the installed catalog + this
# profile together make examples/full a working config.
# Precedence at resolution time: env override > profile > manifest.
#
# These are placeholders — replace the example.com hosts with your own before use.
# `anyctl list` shows every configured service and its origin (catalog:reference).
# The reference manifests live under catalogs/reference/ — the same two shipped in
# examples/catalog/ (installable with `anyctl catalog add examples/catalog`).
version: 1
services:
  uptime:
    base_url: https://status.example.com
  inventory:
    base_url: https://inventory.example.com
    # api_key binds via the INVENTORY_API_KEY env override (declared in the
    # manifest), so no ref is required here. To use 1Password instead, add:
    #   secrets:
    #     api_key: { ref: "op://vault/Inventory/api_key" }
