# portable-demo — a PORTABLE manifest. It declares WHAT the service is (its
# commands, auth strategy, secret slot) but carries NO user-specific base_url or
# secret ref — those live in profile.yaml (see examples/profile.yaml). The same
# file is identical for every user.
name: portable-demo
description: portable manifest demo (binds via profile.yaml)
env_prefix: PORTABLE_DEMO

auth:
  strategy: header-key
  header: X-Api-Key
  value: "{secret.api_key}"

# The slot is DECLARED here; its ref is bound per machine in profile.yaml.
secrets:
  api_key:
    env: PORTABLE_DEMO_API_KEY   # optional env override for CI

commands:
  status:
    help: service status / health
    method: GET
    path: /api/status
    output: { filter: "." }
  list:
    help: list items
    method: GET
    path: /api/items
