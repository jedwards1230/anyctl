# Default values for anyctl-mcp.
# A portable chart: site-specific bits (OnePasswordItem, LAN-only ingress) are
# opt-in via values, so the chart is reusable anywhere.

replicaCount: 1

image:
  repository: ghcr.io/jedwards1230/anyctl
  # tag defaults to .Chart.AppVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# MCP server invocation. These map to `anyctl mcp` flags.
mcp:
  # Listen address passed to `anyctl mcp --http`. Host omitted = all interfaces.
  http: ":9000"
  # HTTP path the streamable MCP handler is mounted at (informational; used for
  # the readiness/liveness note and any ingress path).
  path: /mcp
  # --read-only: expose only read tools, skip every write command.
  readOnly: false
  # --service allowlist; empty list = all services. e.g. [radarr, sonarr, truenas]
  services: []
  # Optional bearer-token auth on the /mcp endpoint. This is TRANSPORT-LAYER
  # access control (who may reach the endpoint at all) — an app-layer boundary
  # that complements networkPolicy, NOT per-tool policy gating. When enabled
  # the token is injected as the ANYCTL_MCP_AUTH_TOKEN env var; callers must
  # then send `Authorization: Bearer <token>`. GET /healthz always stays
  # unauthenticated. Pick exactly one token source (existingSecret or
  # onePasswordItem); enabling without a source is a hard render error
  # (fail-closed).
  #
  # `mcp.http` (above) is a bare-port bind (":9000") — non-loopback, since a
  # Deployment must accept traffic on the pod network — so anyctl's
  # secure-by-default policy requires ONE of auth.enabled or
  # allowUnauthenticated below; leaving both at their defaults makes the
  # container refuse to start (intentional fail-closed, not a bug).
  auth:
    enabled: false
    existingSecret:
      name: ""
      key: token
    onePasswordItem:
      # Set itemPath to render a OnePasswordItem CRD (1Password operator) holding
      # the bearer token. e.g. vaults/<vault>/items/<item>
      itemPath: ""
      key: token
  # Explicit opt-out of anyctl's secure-by-default requirement that a
  # non-loopback --http bind have an auth token configured. Only set this when
  # network-layer controls (e.g. networkPolicy.enabled below, or an upstream
  # gateway) are the sole intended access boundary. Default false.
  allowUnauthenticated: false

# Files rendered into ANYCTL_CONFIG_DIR (/config) via a ConfigMap.
# profileYaml is the per-environment binding (base_url + op:// secret refs).
# The anyctl binary ships NO built-in services, so config.servicesYaml (or an
# installed catalog) is REQUIRED for the pod to expose any tools — an empty
# services config means the MCP server exposes ZERO tools.
config:
  configYaml: ""
  profileYaml: ""
  # servicesYaml: map of service-name → manifest YAML string. Each entry is
  # rendered into a separate ConfigMap and mounted at
  # <config-dir>/services/<name>.yaml — WITHOUT rebuilding the image. This (or an
  # installed catalog under <config-dir>/catalogs/) is what gives the server its
  # tools; empty ⇒ no tools.
  # IMPORTANT: provide UNINDENTED YAML strings — the template indents
  # the content for the ConfigMap; pre-indented input over-indents.
  # Example:
  #   servicesYaml:
  #     radarr: |
  #       name: radarr
  #       auth: { strategy: header-key, ... }
  #       ...
  servicesYaml: {}

# 1Password service-account token used by `op` to resolve op:// refs.
# Pick exactly one source. existingSecret is the portable default; set
# onePasswordItem.itemPath to have the 1Password operator mint it instead.
auth:
  env: OP_SERVICE_ACCOUNT_TOKEN
  existingSecret:
    name: ""
    key: token
  onePasswordItem:
    # Set itemPath to render a OnePasswordItem CRD (1Password operator).
    # e.g. vaults/<vault>/items/<item>
    itemPath: ""
    # Key within the synced secret holding the token value.
    key: token

service:
  type: ClusterIP
  port: 9000

ingress:
  enabled: false
  className: ""
  host: ""
  annotations: {}
  tls: false

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

# fsGroup matches the container's uid/gid (10001) so the writable emptyDir
# mounts (HOME, /tmp) are group-owned by the running user. This pod has no
# shared (e.g. NFS) storage, so no external fsGroup convention applies here.
podSecurityContext:
  fsGroup: 10001
  # Set at both pod and container level: the container securityContext below is
  # what governs this (single) container, but keeping it at the pod level too
  # documents intent and provides the RuntimeDefault floor for any container
  # added later (e.g. a sidecar) that omits its own seccompProfile.
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]
  seccompProfile:
    type: RuntimeDefault

# NetworkPolicy for the MCP pod. The /mcp endpoint has NO app-layer auth, so
# network reachability IS the access boundary — enable this in any cluster that
# supports NetworkPolicy. Off by default to keep the chart portable.
networkPolicy:
  enabled: false
  ingress:
    # Raw NetworkPolicyPeer entries (podSelector/namespaceSelector/ipBlock)
    # allowed to reach the MCP port. Sources are OR-combined. Empty list while
    # enabled = default-deny ingress for this pod (no source may reach it).
    from: []
  egress:
    enabled: false
    # Raw egress rule objects ({to: [...], ports: [...]}). Empty list while
    # egress.enabled = default-deny egress for this pod.
    rules: []

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
# -- Additional pod labels
podLabels: {}
