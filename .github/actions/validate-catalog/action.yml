# Composite action a third-party catalog repository wires into its own CI to
# check its manifests against anyctl's contract: installs anyctl, then runs
# `anyctl catalog validate <path>` (read-only — no network, no install, no
# config dir) against the catalog directory.
name: Validate anyctl catalog
description: >-
  Validate a directory of portable anyctl service manifests with
  `anyctl catalog validate` (the same fail-closed gate `anyctl catalog add`
  enforces).

inputs:
  path:
    description: Catalog directory to validate (top-level *.yaml/*.yml manifests).
    required: false
    default: "."
  version:
    description: anyctl version/ref to install (passed to `go install …@<version>`).
    required: false
    default: latest

runs:
  using: composite
  steps:
    - uses: actions/setup-go@v6
      with:
        go-version: "1.25"
        cache: true

    - name: Install anyctl
      shell: bash
      env:
        ANYCTL_VERSION: ${{ inputs.version }}
      run: go install "github.com/jedwards1230/anyctl@${ANYCTL_VERSION}"

    - name: anyctl catalog validate
      shell: bash
      env:
        CATALOG_PATH: ${{ inputs.path }}
      run: anyctl catalog validate "${CATALOG_PATH}"
